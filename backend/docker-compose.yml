services:
  postgres:
    image: postgres:16-alpine
    container_name: bind-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: bind_user
      POSTGRES_PASSWORD: bind_pass
      POSTGRES_DB: bind_db
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
